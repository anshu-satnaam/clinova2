services:
  # 1. Gateway Service (NestJS)
  - type: web
    name: clinova-gateway
    env: node
    region: ohio
    plan: free
    rootDir: backend/gateway-service
    buildCommand: npm install && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false # User must provide this in Render dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true

  # 2. AI Service (Python)
  - type: web
    name: clinova-ai
    env: python
    region: ohio
    plan: free
    rootDir: backend/ai-service
    buildCommand: "pip install --upgrade pip && pip install -r requirements.txt"
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12
      - key: MISTRAL_API_KEY
        sync: false # User must provide this
      - key: CARTESIA_API_KEY
        sync: false

  # 3. Frontend (Next.js)
  - type: web
    name: clinova-frontend
    env: node
    region: ohio
    plan: free
    rootDir: frontend/nextjs-app
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: clinova-gateway
          property: host
      - key: RESEND_API_KEY
        value: re_CaTAtzrR_5rEKW7RTMKDrzrpV6FyNX96b # Use the provided key
