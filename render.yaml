# ════════════════════════════════════════════════════════════════
#  CLINOVA — Render Blueprint (Free Tier - Public URL Communication)
#  NOTE: Render Free tier has NO private networking.
#  All inter-service communication uses public HTTPS URLs.
# ════════════════════════════════════════════════════════════════

services:
  # 1. ChromaDB (Vector Database)
  - type: web
    name: clinova-chroma
    env: docker
    region: ohio
    plan: free
    rootDir: backend/chroma-service

  # 2. AI Service (FastAPI + Mistral)
  - type: web
    name: clinova-ai
    env: python
    region: ohio
    plan: free
    rootDir: backend/ai-service
    buildCommand: "pip install --upgrade pip && pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12
      - key: CHROMA_HOST
        value: clinova-chroma.onrender.com
      - key: CHROMA_PORT
        value: "443"
      - key: CHROMA_SSL
        value: "true"
      - key: MISTRAL_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false

  # 3. FHIR Service (FastAPI)
  - type: web
    name: clinova-fhir
    env: python
    region: ohio
    plan: free
    rootDir: backend/fhir-service
    buildCommand: "pip install --upgrade pip && pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12
      - key: DATABASE_URL
        sync: false

  # 4. Audit Service (FastAPI)
  - type: web
    name: clinova-audit
    env: python
    region: ohio
    plan: free
    rootDir: backend/audit-service
    buildCommand: "pip install --upgrade pip && pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12
      - key: DATABASE_URL
        sync: false

  # 5. Voice Service (FastAPI)
  - type: web
    name: clinova-voice
    env: python
    region: ohio
    plan: free
    rootDir: backend/voice-service
    buildCommand: "pip install --upgrade pip && pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12
      - key: AI_SERVICE_URL
        value: https://clinova-ai.onrender.com
      - key: FHIR_SERVICE_URL
        value: https://clinova-fhir.onrender.com
      - key: LIVEKIT_API_KEY
        sync: false
      - key: LIVEKIT_API_SECRET
        sync: false
      - key: LIVEKIT_URL
        sync: false
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: CARTESIA_API_KEY
        sync: false

  # 6. Gateway Service (NestJS)
  - type: web
    name: clinova-gateway
    env: node
    region: ohio
    plan: free
    rootDir: backend/gateway-service
    buildCommand: "bash build.sh"
    startCommand: "npm run start:prod"
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://clinova-dashboard.onrender.com
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: AI_SERVICE_URL
        value: https://clinova-ai.onrender.com
      - key: FHIR_SERVICE_URL
        value: https://clinova-fhir.onrender.com
      - key: VOICE_SERVICE_URL
        value: https://clinova-voice.onrender.com
      - key: AUDIT_SERVICE_URL
        value: https://clinova-audit.onrender.com

  # 7. Frontend (Next.js)
  - type: web
    name: clinova-dashboard
    env: docker
    region: ohio
    plan: free
    rootDir: frontend/nextjs-app
    dockerBuildArgs:
      NEXT_PUBLIC_API_URL: https://clinova-gateway.onrender.com
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://clinova-gateway.onrender.com
