services:
  # 1. Gateway Service
  - type: web
    name: clinova-gateway-v2
    env: node
    region: ohio
    plan: free
    rootDir: backend/gateway-service
    buildCommand: npm install && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true

  # 2. AI Service
  - type: web
    name: clinova-ai-v2
    env: python
    region: ohio
    plan: free
    rootDir: backend/ai-service
    buildCommand: "pip install --upgrade pip && pip install -r requirements.txt"
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12
      - key: MISTRAL_API_KEY
        sync: false

  # 3. Main Frontend (The one from localhost:3001)
  - type: web
    name: clinova-live-dashboard
    env: node
    region: ohio
    plan: free
    rootDir: frontend/nextjs-app
    buildCommand: npm install && npm run build
    startCommand: "npm run start -- -p $PORT"
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: clinova-gateway-v2
          property: host
      - key: PORT
        value: 10000
      - key: RESEND_API_KEY
        value: re_CaTAtzrR_5rEKW7RTMKDrzrpV6FyNX96b
