version: "3.9"

# ════════════════════════════════════════════════════════════════
#  CLINOVA — Full-Stack Healthcare AI Platform
#  docker-compose.yml — Production-ready microservices stack
# ════════════════════════════════════════════════════════════════
#
#  Services:
#   gateway-service  :3000  — NestJS API Gateway + Prisma/NeonDB
#   ai-service       :8001  — FastAPI + LangGraph + Mistral
#   fhir-service     :8002  — FastAPI FHIR R4 records
#   voice-service    :8003  — FastAPI + LiveKit + Deepgram
#   audit-service    :8004  — FastAPI HIPAA audit trail
#   chromadb         :8005  — ChromaDB vector database
#   frontend         :3001  — Next.js clinical dashboard
#
#  Usage:
#   1. Copy .env.example to .env and fill in API keys
#   2. docker compose up --build
#   3. Open http://localhost:3001
# ════════════════════════════════════════════════════════════════

x-python-common: &python-common
  restart: unless-stopped
  networks:
    - clinova-net

services:

  # ── ChromaDB (must start first, AI depends on it) ────────────
  chromadb:
    image: chromadb/chroma:latest
    container_name: clinova-chromadb
    ports:
      - "8005:8000"
    volumes:
      - chroma-data:/chroma/chroma
    environment:
      - CHROMA_SERVER_HOST=0.0.0.0
      - ALLOW_RESET=TRUE
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s
    <<: *python-common

  # ── FastAPI AI Service ───────────────────────────────────────
  ai-service:
    build:
      context: ./backend/ai-service
      dockerfile: Dockerfile
    container_name: clinova-ai
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
      - MISTRAL_MODEL=${MISTRAL_MODEL:-mistral-small-latest}
      - DATABASE_URL=${DATABASE_URL}
      - KAFKA_BROKER_URL=${KAFKA_BROKER_URL:-}
      - KAFKA_USERNAME=${KAFKA_USERNAME:-}
      - KAFKA_PASSWORD=${KAFKA_PASSWORD:-}
    depends_on:
      chromadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 60s
    <<: *python-common

  # ── FastAPI FHIR Service ─────────────────────────────────────
  fhir-service:
    build:
      context: ./backend/fhir-service
      dockerfile: Dockerfile
    container_name: clinova-fhir
    ports:
      - "8002:8002"
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - KAFKA_BROKER_URL=${KAFKA_BROKER_URL:-}
      - KAFKA_USERNAME=${KAFKA_USERNAME:-}
      - KAFKA_PASSWORD=${KAFKA_PASSWORD:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    <<: *python-common

  # ── FastAPI Voice Service ────────────────────────────────────
  voice-service:
    build:
      context: ./backend/voice-service
      dockerfile: Dockerfile
    container_name: clinova-voice
    ports:
      - "8003:8003"
    env_file:
      - .env
    environment:
      - LIVEKIT_URL=${LIVEKIT_URL:-}
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY:-}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET:-}
      - DEEPGRAM_API_KEY=${DEEPGRAM_API_KEY:-}
      - CARTESIA_API_KEY=${CARTESIA_API_KEY:-}
      - CARTESIA_VOICE_ID=${CARTESIA_VOICE_ID:-}
      - AI_SERVICE_URL=http://ai-service:8001
      - FHIR_SERVICE_URL=http://fhir-service:8002
      - KAFKA_BROKER_URL=${KAFKA_BROKER_URL:-}
      - KAFKA_USERNAME=${KAFKA_USERNAME:-}
      - KAFKA_PASSWORD=${KAFKA_PASSWORD:-}
    depends_on:
      ai-service:
        condition: service_healthy
      fhir-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    <<: *python-common

  # ── FastAPI Audit Service ────────────────────────────────────
  audit-service:
    build:
      context: ./backend/audit-service
      dockerfile: Dockerfile
    container_name: clinova-audit
    ports:
      - "8004:8004"
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - KAFKA_BROKER_URL=${KAFKA_BROKER_URL:-}
      - KAFKA_USERNAME=${KAFKA_USERNAME:-}
      - KAFKA_PASSWORD=${KAFKA_PASSWORD:-}
      - AUDIT_RETENTION_DAYS=${AUDIT_RETENTION_DAYS:-2555}
      - HIPAA_MODE=${HIPAA_MODE:-true}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    <<: *python-common

  # ── NestJS API Gateway ───────────────────────────────────────
  gateway-service:
    build:
      context: ./backend/gateway-service
      dockerfile: Dockerfile
    container_name: clinova-gateway
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-15m}
      - JWT_REFRESH_EXPIRES_IN=${JWT_REFRESH_EXPIRES_IN:-7d}
      - AI_SERVICE_URL=http://ai-service:8001
      - FHIR_SERVICE_URL=http://fhir-service:8002
      - VOICE_SERVICE_URL=http://voice-service:8003
      - AUDIT_SERVICE_URL=http://audit-service:8004
      - KAFKA_BROKER_URL=${KAFKA_BROKER_URL:-}
      - KAFKA_USERNAME=${KAFKA_USERNAME:-}
      - KAFKA_PASSWORD=${KAFKA_PASSWORD:-}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - HIPAA_MODE=${HIPAA_MODE:-true}
    depends_on:
      ai-service:
        condition: service_healthy
      fhir-service:
        condition: service_healthy
      audit-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    networks:
      - clinova-net

  # ── Next.js Frontend ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend/nextjs-app
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:3000
    container_name: clinova-frontend
    ports:
      - "3001:3001"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3000
    depends_on:
      gateway-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    networks:
      - clinova-net

networks:
  clinova-net:
    driver: bridge
    name: clinova-network

volumes:
  chroma-data:
    driver: local
    name: clinova-chroma-data
