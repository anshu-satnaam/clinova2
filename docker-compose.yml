services:
  # ── NestJS API Gateway ──────────────────────────────────────
  gateway-service:
    build:
      context: ./backend/gateway-service
      dockerfile: Dockerfile
    container_name: clinova-gateway
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN}
      - JWT_REFRESH_EXPIRES_IN=${JWT_REFRESH_EXPIRES_IN}
      - AI_SERVICE_URL=http://ai-service:8001
      - FHIR_SERVICE_URL=http://fhir-service:8002
      - VOICE_SERVICE_URL=http://voice-service:8003
      - AUDIT_SERVICE_URL=http://audit-service:8004
      - KAFKA_BROKER_URL=${KAFKA_BROKER_URL}
      - KAFKA_USERNAME=${KAFKA_USERNAME}
      - KAFKA_PASSWORD=${KAFKA_PASSWORD}
    depends_on:
      - ai-service
      - fhir-service
      - voice-service
      - audit-service
      - chromadb
    networks:
      - clinova-net
    restart: unless-stopped

  # ── FastAPI AI Service ──────────────────────────────────────
  ai-service:
    build:
      context: ./backend/ai-service
      dockerfile: Dockerfile
    container_name: clinova-ai
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
      - MISTRAL_MODEL=${MISTRAL_MODEL}
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8005
      - KAFKA_BROKER_URL=${KAFKA_BROKER_URL}
      - KAFKA_USERNAME=${KAFKA_USERNAME}
      - KAFKA_PASSWORD=${KAFKA_PASSWORD}
    depends_on:
      - chromadb
    networks:
      - clinova-net
    restart: unless-stopped

  # ── FastAPI FHIR Service ────────────────────────────────────
  fhir-service:
    build:
      context: ./backend/fhir-service
      dockerfile: Dockerfile
    container_name: clinova-fhir
    ports:
      - "8002:8002"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - KAFKA_BROKER_URL=${KAFKA_BROKER_URL}
      - KAFKA_USERNAME=${KAFKA_USERNAME}
      - KAFKA_PASSWORD=${KAFKA_PASSWORD}
    networks:
      - clinova-net
    restart: unless-stopped

  # ── FastAPI Voice Service ───────────────────────────────────
  voice-service:
    build:
      context: ./backend/voice-service
      dockerfile: Dockerfile
    container_name: clinova-voice
    ports:
      - "8003:8003"
    environment:
      - LIVEKIT_URL=${LIVEKIT_URL}
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET}
      - DEEPGRAM_API_KEY=${DEEPGRAM_API_KEY}
      - CARTESIA_API_KEY=${CARTESIA_API_KEY}
      - CARTESIA_VOICE_ID=${CARTESIA_VOICE_ID}
      - KAFKA_BROKER_URL=${KAFKA_BROKER_URL}
      - KAFKA_USERNAME=${KAFKA_USERNAME}
      - KAFKA_PASSWORD=${KAFKA_PASSWORD}
      - AI_SERVICE_URL=http://ai-service:8001
      - FHIR_SERVICE_URL=http://fhir-service:8002
    depends_on:
      - ai-service
      - fhir-service
    networks:
      - clinova-net
    restart: unless-stopped

  # ── FastAPI Audit Service ───────────────────────────────────
  audit-service:
    build:
      context: ./backend/audit-service
      dockerfile: Dockerfile
    container_name: clinova-audit
    ports:
      - "8004:8004"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - KAFKA_BROKER_URL=${KAFKA_BROKER_URL}
      - KAFKA_USERNAME=${KAFKA_USERNAME}
      - KAFKA_PASSWORD=${KAFKA_PASSWORD}
      - AUDIT_RETENTION_DAYS=${AUDIT_RETENTION_DAYS}
    networks:
      - clinova-net
    restart: unless-stopped

  # ── ChromaDB Vector Database ────────────────────────────────
  chromadb:
    image: chromadb/chroma:latest
    container_name: clinova-chromadb
    ports:
      - "8005:8000"
    volumes:
      - chroma-data:/chroma/chroma
    networks:
      - clinova-net
    restart: unless-stopped

  # ── Next.js Dummy Frontend ──────────────────────────────────
  frontend:
    build:
      context: ./frontend/nextjs-app
      dockerfile: Dockerfile
    container_name: clinova-frontend
    ports:
      - "3001:3001"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3000
    depends_on:
      - gateway-service
    networks:
      - clinova-net
    restart: unless-stopped

networks:
  clinova-net:
    driver: bridge

volumes:
  chroma-data:
    driver: local
